<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#0a0a0f"/>
  <!-- Green border glow -->
  <rect x="0" y="0" width="32" height="2" fill="#4ade80"/>
  <rect x="0" y="30" width="32" height="2" fill="#4ade80"/>
  <rect x="0" y="0" width="2" height="32" fill="#4ade80"/>
  <rect x="30" y="0" width="2" height="32" fill="#4ade80"/>

  <!-- L pixel letter -->
  <rect x="4" y="6" width="3" height="14" fill="#4ade80"/>
  <rect x="4" y="17" width="9" height="3" fill="#4ade80"/>

  <!-- C pixel letter -->
  <rect x="16" y="6" width="9" height="3" fill="#4ade80"/>
  <rect x="16" y="17" width="9" height="3" fill="#4ade80"/>
  <rect x="16" y="6" width="3" height="14" fill="#4ade80"/>

  <!-- Dim pixel dots for texture -->
  <rect x="5" y="24" width="2" height="2" fill="#166534"/>
  <rect x="9" y="24" width="2" height="2" fill="#166534"/>
  <rect x="13" y="24" width="2" height="2" fill="#166534"/>
  <rect x="17" y="24" width="2" height="2" fill="#166534"/>
  <rect x="21" y="24" width="2" height="2" fill="#166534"/>
  <rect x="25" y="24" width="2" height="2" fill="#166534"/>
</svg>
